<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Etheral Shadow Proper Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, sans-serif; background: #ffffff; overflow-x: hidden; }
    
    #etheral-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    
    .content {
      position: relative;
      z-index: 1;
      padding: 60px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 { font-size: 48px; margin: 20px 0; color: #333; }
    p { color: #666; line-height: 1.6; margin: 10px 0; font-size: 16px; }
    
    section { 
      margin: 100px 0; 
      padding: 40px; 
      background: rgba(255,255,255,0.95);
      border-radius: 12px; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <canvas id="etheral-canvas"></canvas>

  <div class="content">
    <h1>Etheral Shadows</h1>
    <p>You should see fluid, ethereal gray shadows flowing smoothly.</p>
    
    <section>
      <h2>Section 1</h2>
      <p>Sophisticated shadow effects with smooth hue shifts.</p>
    </section>
    
    <section>
      <h2>Section 2</h2>
      <p>Organic, flowing patterns that evolve continuously.</p>
    </section>
    
    <section>
      <h2>Section 3</h2>
      <p>Dark, ethereal aesthetic that enhances the design.</p>
    </section>
  </div>

  <script>
    const canvas = document.getElementById('etheral-canvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    let time = 0;
    
    function drawEtherealShadow(x, y, size, hue, alpha) {
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
      gradient.addColorStop(0, `hsla(${hue}, 50%, 50%, ${alpha * 0.8})`);
      gradient.addColorStop(0.4, `hsla(${hue}, 45%, 45%, ${alpha * 0.4})`);
      gradient.addColorStop(0.7, `hsla(${hue}, 40%, 40%, ${alpha * 0.15})`);
      gradient.addColorStop(1, `hsla(${hue}, 35%, 35%, 0)`);
      
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function noise(x, y, t) {
      return Math.sin(x * 0.005 + t) * Math.sin(y * 0.005 + t * 0.7) * Math.sin((x + y) * 0.002 + t * 0.3);
    }
    
    function animate() {
      // Dark, semi-transparent background for depth
      ctx.fillStyle = 'rgba(255, 255, 255, 0.015)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      time += 0.005;
      
      // Primary ethereal shadow - large, slow
      const shadow1X = canvas.width * 0.3 + noise(canvas.width * 0.3, 0, time) * 120;
      const shadow1Y = canvas.height * 0.35 + noise(0, canvas.height * 0.35, time * 0.8) * 100;
      drawEtherealShadow(shadow1X, shadow1Y, 450, (time * 15 + 200) % 360, 0.18);
      
      // Secondary ethereal shadow - medium speed
      const shadow2X = canvas.width * 0.7 + noise(canvas.width * 0.7, canvas.height, time * 1.2) * 100;
      const shadow2Y = canvas.height * 0.65 + noise(canvas.width, canvas.height * 0.65, time * 0.9) * 120;
      drawEtherealShadow(shadow2X, shadow2Y, 400, (time * 12 + 250) % 360, 0.15);
      
      // Tertiary ethereal shadow - subtle accent
      const shadow3X = canvas.width * 0.5 + noise(canvas.width * 0.5, canvas.height * 0.5, time * 0.7) * 150;
      const shadow3Y = canvas.height * 0.5 + noise(canvas.width * 0.5, canvas.height * 0.5, time * 0.6) * 150;
      drawEtherealShadow(shadow3X, shadow3Y, 550, (time * 10 + 220) % 360, 0.1);
      
      // Overlay subtle distortion
      ctx.fillStyle = `rgba(100, 100, 120, ${Math.sin(time * 0.5) * 0.015 + 0.01})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
