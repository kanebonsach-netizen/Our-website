<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Etheral Shadow Canvas Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, sans-serif; background: #f5f5f5; overflow-x: hidden; }
    
    #etheral-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    
    .content {
      position: relative;
      z-index: 1;
      padding: 60px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 { font-size: 48px; margin: 20px 0; color: #333; }
    p { color: #666; line-height: 1.6; margin: 10px 0; font-size: 16px; }
    
    section { 
      margin: 100px 0; 
      padding: 40px; 
      background: rgba(255,255,255,0.95);
      border-radius: 12px; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    h2 { color: #333; }
  </style>
</head>
<body>
  <!-- Canvas Background -->
  <canvas id="etheral-canvas"></canvas>

  <div class="content">
    <h1>Etheral Shadow - Canvas Version</h1>
    <p>You should see animated flowing shapes and colors shifting in the background.</p>
    
    <section>
      <h2>Section 1</h2>
      <p>The background has animated blobs with hue rotation.</p>
    </section>
    
    <section>
      <h2>Section 2</h2>
      <p>Watch the colors continuously shift and evolve.</p>
    </section>
    
    <section>
      <h2>Section 3</h2>
      <p>Smooth, organic movement throughout the page.</p>
    </section>
  </div>

  <script>
    const canvas = document.getElementById('etheral-canvas');
    const ctx = canvas.getContext('2d');
    
    // Set canvas size
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    let time = 0;
    
    function drawBlob(x, y, radius, hue, alpha) {
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, `hsla(${hue}, 70%, 60%, ${alpha})`);
      gradient.addColorStop(0.5, `hsla(${hue + 30}, 60%, 50%, ${alpha * 0.5})`);
      gradient.addColorStop(1, `hsla(${hue + 60}, 50%, 40%, 0)`);
      
      ctx.fillStyle = gradient;
      ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
    }
    
    function animate() {
      // Clear canvas with semi-transparent background for trail effect
      ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      time += 0.003;
      
      // Create animated blobs
      const blob1X = canvas.width * 0.2 + Math.sin(time * 0.5) * 150;
      const blob1Y = canvas.height * 0.3 + Math.cos(time * 0.3) * 150;
      
      const blob2X = canvas.width * 0.8 + Math.sin(time * 0.4) * 150;
      const blob2Y = canvas.height * 0.7 + Math.cos(time * 0.35) * 150;
      
      const blob3X = canvas.width * 0.5 + Math.sin(time * 0.25) * 200;
      const blob3Y = canvas.height * 0.5 + Math.cos(time * 0.2) * 200;
      
      // Draw blobs with shifting hues
      const hue1 = (time * 50 + 200) % 360;
      const hue2 = (time * 40 + 280) % 360;
      const hue3 = (time * 30 + 160) % 360;
      
      drawBlob(blob1X, blob1Y, 300, hue1, 0.15);
      drawBlob(blob2X, blob2Y, 280, hue2, 0.12);
      drawBlob(blob3X, blob3Y, 350, hue3, 0.1);
      
      // Add subtle noise
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = `rgba(100, 100, 150, ${0.02 * Math.sin(time + i)})`;
        ctx.fillRect(
          Math.random() * canvas.width,
          Math.random() * canvas.height,
          Math.random() * 200,
          Math.random() * 200
        );
      }
      
      requestAnimationFrame(animate);
    }
    
    animate();
    console.log('Etheral Canvas animation started');
  </script>
</body>
</html>
